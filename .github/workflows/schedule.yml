name: DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
  schedule: # 定时任务
    - cron: '29 0 * * *' # 修改到8.29执行 
    - cron: '29 12 * * *' # 备用时间 
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: Run DouYin Spark Flow
      run: python main.py
    - name: Notify on workflow failure
      if: failure()
      env:
        NOTIFY_TYPE: ${{ vars.NOTIFY_TYPE }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        python - <<'PY'
        import os
        from utils.notify import notify
        run_url = os.getenv("RUN_URL", "")
        notify(
            "续火花 Workflow 失败",
            f"GitHub Actions 任务执行失败，可能在依赖安装、浏览器安装或脚本启动阶段出错。\n\n[查看日志]({run_url})",
            success=False,
        )
        PY
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
